<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleardent - Paneles de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-orange-50 min-h-screen">
    <div class="container mx-auto px-4 py-16 max-w-4xl">
        <div class="text-center mb-12">
            <div class="inline-block bg-orange-100 rounded-3xl p-4 mb-6">
                <span class="text-6xl">🦷</span>
            </div>
            <h1 class="text-4xl font-bold text-gray-800 mb-3">Cleardent</h1>
            <p class="text-gray-600 text-lg">Paneles de Gestión y Calendario GBP</p>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- Calendario -->
            <a href="calendario-cleardent.html"
               class="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-blue-500 group">
                <div class="text-center">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📅</div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Calendario GBP</h2>
                    <p class="text-sm text-gray-600 mb-4">Marzo y Abril 2026</p>
                    <div class="inline-flex items-center text-blue-600 text-sm font-medium">
                        <span>Ver calendario</span>
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                </div>
            </a>

            <!-- Panel Clínicas -->
            <a href="panel-clinicas.html"
               class="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-green-500 group">
                <div class="text-center">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">🏥</div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Panel Clínicas</h2>
                    <p class="text-sm text-gray-600 mb-4">Gestión de imágenes</p>
                    <div class="inline-flex items-center text-green-600 text-sm font-medium">
                        <span>Ver panel</span>
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                </div>
            </a>

            <!-- Panel con Ejemplos -->
            <a href="panel-clinicas-ejemplos.html"
               class="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-orange-500 group">
                <div class="text-center">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📋</div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Panel + Ejemplos</h2>
                    <p class="text-sm text-gray-600 mb-4">Con nomenclatura de archivos</p>
                    <div class="inline-flex items-center text-orange-600 text-sm font-medium">
                        <span>Ver panel</span>
                        <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                </div>
            </a>
        </div>

        <div class="mt-12 text-center">
            <div class="inline-block bg-white rounded-2xl px-6 py-4 shadow-md">
                <p class="text-sm text-gray-500">
                    <span class="font-semibold text-gray-700">WoodSearch</span> × Cleardent
                </p>
            </div>
        </div>
    </div>
</body>
</html>
